stages:
  - build
  - test
  - security
  - docker

default:
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

build:
  stage: build
  script:
    - npm run build

test:
  stage: test
  script:
    - npm test

security:
  stage: security
  script:
    - npm audit --audit-level=high

docker:
  stage: docker
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script: []
  script:
    - docker build -t salamtak-backend .
