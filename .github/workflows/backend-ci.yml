name: Backend CI

on:
  push:
    branches: [main, dev_os]
  pull_request:
    branches: [main, dev_os]

jobs:
  backend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run audit
      - run: docker build -t salamtak-backend .
