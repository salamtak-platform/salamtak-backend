services:
  - type: web
    name: salamtak-backend
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_URI
        sync: false
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: HOST
        value: smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_SECURE
        value: "false"
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ACCESS_SIGNATURE
        sync: false
      - key: REFRESH_SIGNATURE
        sync: false
      - key: BEARER
        value: Bearer
      - key: JWT_SECRET
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
